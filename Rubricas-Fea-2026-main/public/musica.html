<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio</title>

  <link rel="stylesheet" href="styleindex.css">
</head>
<body>

<header class="topbar">

  <div class="brand">
    <span>FEA 2026</span>
  </div>

  <img class="topbar-logo" src="Imagenes/26FEA.webp" alt="Logo FEA 2026">

  <div class="header-actions">

    <!-- BOTÓN CERRAR SESIÓN -->
    <button id="logout-btn" class="btn">
      🚪 Cerrar Sesión
    </button>

  </div>

</header>

<img class="imagen-esquina" src="Imagenes/ciber.jpeg" alt="Marca de agua">
<img class="imagen-esquina-iz" src="Imagenes/Untitled.jpeg" alt="Marca de agua">

<main>

  <section class="section-home">

    <div class="home-welcome">

      <h1>¡Bienvenido(a)!</h1>

      <p>
        Accede a las secciones de la página desde aquí.
      </p>

      <div class="home-cta">

        <a class="nav-btn" href="musica/garaje.html">
          Banda de Garage
        </a>

        <a class="nav-btn" href="musica/original.html">
          Cancion Original
        </a>

        <a class="nav-btn" href="musica/popular.html">
          Cancion Popular
        </a>

        <a class="nav-btn" href="musica/tipica.html">
          Cancion Tipica
        </a>

      </div>

    </div>

  </section>

</main>

<script>

// PROTEGER PÁGINA
const rol = localStorage.getItem("rol");

if (rol !== "musicales") {
  window.location.href = "login.html";
}

// CERRAR SESIÓN
document.getElementById("logout-btn").addEventListener("click", () => {

  // borrar sesión
  localStorage.removeItem("user");
  localStorage.removeItem("nombre");
  localStorage.removeItem("rol");

  // regresar al login
  window.location.href = "login.html";

});

</script>

</body>
</html>
